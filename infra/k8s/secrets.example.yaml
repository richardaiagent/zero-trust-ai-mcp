# infra/k8s/secrets.example.yaml
# ⚠️ 이 파일을 절대 실제 값으로 채워서 git에 커밋하지 말 것
# 운영: kubectl apply -f secrets.yaml (별도 관리) 또는 Vault / External Secrets Operator 사용
# 로컬: kubectl create secret generic mcp-gateway-secret --from-env-file=src/gateway/.env

---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-gateway-secret
  namespace: mcp
type: Opaque
stringData:
  JWT_SECRET_KEY: "CHANGE_ME"
  DEBUG: "false"

---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-orchestrator-secret
  namespace: mcp
type: Opaque
stringData:
  LLM_API_KEY: "CHANGE_ME"
  DEBUG: "false"

---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-rag-service-secret
  namespace: mcp
type: Opaque
stringData:
  EMBEDDING_API_KEY: "CHANGE_ME"
  DEBUG: "false"

---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-postgres-secret
  namespace: mcp
type: Opaque
stringData:
  password: "CHANGE_ME"

---
apiVersion: v1
kind: Secret
metadata:
  name: mcp-redis-secret
  namespace: mcp
type: Opaque
stringData:
  password: "CHANGE_ME"
