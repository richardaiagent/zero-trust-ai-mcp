# infra/docker-compose.yml
# 로컬 개발용 — Docker Desktop (Windows 11) 기준
# 실행: docker compose -f infra/docker-compose.yml up -d

version: "3.9"

# ──────────────────────────────────────────
# 공통 설정
# ──────────────────────────────────────────
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-restart: &default-restart
  restart: unless-stopped

# ──────────────────────────────────────────
# 네트워크
# ──────────────────────────────────────────
networks:
  mcp-net:
    driver: bridge

# ──────────────────────────────────────────
# 볼륨
# ──────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:
  qdrant-data:
  prometheus-data:
  grafana-data:

# ──────────────────────────────────────────
# 서비스 정의
# ──────────────────────────────────────────
services:

  # ── 인프라 컴포넌트 ─────────────────────

  postgres:
    image: postgres:16-alpine
    <<: *default-restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: mcp
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  redis:
    image: redis:7-alpine
    <<: *default-restart
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis-data:/data
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    logging: *default-logging

  # Qdrant — 벡터 DB (Chapter 4: ChromaDB 대신 Qdrant 사용)
  qdrant:
    image: qdrant/qdrant:v1.11.0
    <<: *default-restart
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # OPA — 정책 엔진 (Chapter 9: Rego 기반 ABAC)
  opa:
    image: openpolicyagent/opa:0.68.0
    <<: *default-restart
    command:
      - "run"
      - "--server"
      - "--log-level=info"
      - "/policies"
    volumes:
      - ./opa/policies:/policies:ro
    networks:
      - mcp-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8181/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  # ── 관측성 스택 (Chapter 13) ────────────

  prometheus:
    image: prom/prometheus:v2.54.0
    <<: *default-restart
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - mcp-net
    logging: *default-logging

  grafana:
    image: grafana/grafana:11.2.0
    <<: *default-restart
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - mcp-net
    depends_on:
      - prometheus
    logging: *default-logging

  jaeger:
    image: jaegertracing/all-in-one:1.61
    <<: *default-restart
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
    networks:
      - mcp-net
    logging: *default-logging

  # ── MCP 마이크로서비스 ──────────────────

  policy-engine:
    build:
      context: ../
      dockerfile: src/policy-engine/Dockerfile
    <<: *default-restart
    env_file:
      - ../src/policy-engine/.env
    networks:
      - mcp-net
    depends_on:
      opa:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging

  audit-service:
    build:
      context: ../
      dockerfile: src/audit-service/Dockerfile
    <<: *default-restart
    env_file:
      - ../src/audit-service/.env
    networks:
      - mcp-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8006/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging

  context-service:
    build:
      context: ../
      dockerfile: src/context-service/Dockerfile
    <<: *default-restart
    env_file:
      - ../src/context-service/.env
    networks:
      - mcp-net
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8005/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging

  rag-service:
    build:
      context: ../
      dockerfile: src/rag-service/Dockerfile
    <<: *default-restart
    env_file:
      - ../src/rag-service/.env
    networks:
      - mcp-net
    depends_on:
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging

  tool-service:
    build:
      context: ../
      dockerfile: src/tool-service/Dockerfile
    <<: *default-restart
    env_file:
      - ../src/tool-service/.env
    networks:
      - mcp-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging

  orchestrator:
    build:
      context: ../
      dockerfile: src/orchestrator/Dockerfile
    <<: *default-restart
    env_file:
      - ../src/orchestrator/.env
    environment:
      POLICY_ENGINE_URL: http://policy-engine:8002
      CONTEXT_SERVICE_URL: http://context-service:8005
      RAG_SERVICE_URL: http://rag-service:8004
      TOOL_SERVER_URL: http://tool-service:8003   # config: tool_server_url
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    networks:
      - mcp-net
    depends_on:
      policy-engine:
        condition: service_healthy
      context-service:
        condition: service_healthy
      rag-service:
        condition: service_healthy
      tool-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging

  gateway:
    build:
      context: ../
      dockerfile: src/gateway/Dockerfile
    <<: *default-restart
    env_file:
      - ../src/gateway/.env
    environment:
      ORCHESTRATOR_URL: http://orchestrator:8001
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    ports:
      - "8000:8000"   # 유일하게 외부 노출
    networks:
      - mcp-net
    depends_on:
      orchestrator:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz', timeout=3)"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging: *default-logging
